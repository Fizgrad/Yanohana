<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">やわらかな光に包まれたシルクフラワー</title>
  <desc id="desc">セージグリーンの背景に、ローズ、デイジー、小花と葉を重ねた上品な花のアレンジメント</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9d5c9"/>
      <stop offset=".45" stop-color="#cdd4c4"/>
      <stop offset="1" stop-color="#aebfa5"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#fff" stop-opacity=".7"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7f9a73"/>
      <stop offset="1" stop-color="#4f6f4b"/>
    </linearGradient>
    <linearGradient id="leafLight" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a8bd96"/>
      <stop offset="1" stop-color="#6f8d62"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#344331" flood-opacity=".16"/>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
    <g id="fullFlower">
      <g fill="currentColor">
        <ellipse rx="54" ry="100" transform="rotate(0) translate(0 -47)"/>
        <ellipse rx="54" ry="100" transform="rotate(45) translate(0 -47)" opacity=".95"/>
        <ellipse rx="54" ry="100" transform="rotate(90) translate(0 -47)" opacity=".92"/>
        <ellipse rx="54" ry="100" transform="rotate(135) translate(0 -47)" opacity=".96"/>
        <ellipse rx="54" ry="100" transform="rotate(180) translate(0 -47)"/>
        <ellipse rx="54" ry="100" transform="rotate(225) translate(0 -47)" opacity=".9"/>
        <ellipse rx="54" ry="100" transform="rotate(270) translate(0 -47)" opacity=".94"/>
        <ellipse rx="54" ry="100" transform="rotate(315) translate(0 -47)" opacity=".96"/>
      </g>
      <circle r="50" fill="#f4dfb0"/>
      <circle r="24" fill="#c5a667" opacity=".78"/>
      <circle cx="-14" cy="-12" r="7" fill="#fff7d9" opacity=".8"/>
    </g>
    <g id="rose">
      <circle r="92" fill="currentColor" opacity=".78"/>
      <circle cx="-63" cy="10" r="62" fill="currentColor" opacity=".92"/>
      <circle cx="58" cy="4" r="60" fill="currentColor" opacity=".86"/>
      <circle cy="-58" r="59" fill="currentColor"/>
      <circle cx="-35" cy="-25" r="45" fill="#fff" opacity=".2"/>
      <path d="M-35 15Q0-45 40 8Q10 60-35 15Z" fill="currentColor" opacity=".72"/>
    </g>
    <g id="daisy">
      <g fill="#fffdf6">
        <ellipse rx="14" ry="42" cy="-34"/>
        <ellipse rx="14" ry="42" cy="-34" transform="rotate(45)"/>
        <ellipse rx="14" ry="42" cy="-34" transform="rotate(90)"/>
        <ellipse rx="14" ry="42" cy="-34" transform="rotate(135)"/>
        <ellipse rx="14" ry="42" cy="-34" transform="rotate(180)"/>
        <ellipse rx="14" ry="42" cy="-34" transform="rotate(225)"/>
        <ellipse rx="14" ry="42" cy="-34" transform="rotate(270)"/>
        <ellipse rx="14" ry="42" cy="-34" transform="rotate(315)"/>
      </g>
      <circle r="24" fill="#d7b35d"/>
      <circle r="10" fill="#aa8847" opacity=".7"/>
    </g>
    <g id="tinyFlower">
      <circle cy="-12" r="13" fill="currentColor"/>
      <circle cx="11" cy="-4" r="13" fill="currentColor"/>
      <circle cx="7" cy="10" r="13" fill="currentColor"/>
      <circle cx="-7" cy="10" r="13" fill="currentColor"/>
      <circle cx="-11" cy="-4" r="13" fill="currentColor"/>
      <circle r="6" fill="#e6c77d"/>
    </g>
  </defs>

  <rect width="1600" height="1000" fill="url(#background)"/>
  <ellipse cx="315" cy="140" rx="360" ry="320" fill="url(#light)" opacity=".5"/>
  <circle cx="1440" cy="130" r="230" fill="#f7f4ea" opacity=".34"/>
  <circle cx="1250" cy="760" r="300" fill="#e8eee3" opacity=".22"/>
  <circle cx="830" cy="150" r="105" fill="#f1e7d1" opacity=".18" filter="url(#blur)"/>

  <g fill="none" stroke="#6f8667" stroke-width="3" opacity=".22">
    <path d="M80 850Q210 650 270 390Q315 240 430 155"/>
    <path d="M190 700q-80-65-135-20M235 560q90-80 155-50M285 410q-70-70-118-35"/>
    <path d="M1515 720q-100-210-80-430M1465 525q85-55 120-18M1444 420q-75-58-118-22"/>
  </g>

  <g filter="url(#softShadow)">
    <g fill="none" stroke="#57734f" stroke-linecap="round">
      <path d="M1040 1060Q1000 760 1015 420" stroke-width="18"/>
      <path d="M1050 1050Q1110 710 1260 300" stroke-width="15"/>
      <path d="M990 1050Q910 700 830 380" stroke-width="14"/>
      <path d="M1075 1050Q1210 750 1435 480" stroke-width="12"/>
      <path d="M980 1040Q850 810 720 590" stroke-width="9"/>
      <path d="M1110 1040Q1180 690 1160 490" stroke-width="10"/>
    </g>

    <g fill="url(#leaf)">
      <path d="M980 770C810 745 785 610 935 595c112-11 127 92 45 175Z"/>
      <path d="M1070 740c160-90 250 3 159 122-70 91-156 35-159-122Z"/>
      <path d="M900 605c-135-68-105-183 29-145 93 27 85 104-29 145Z"/>
      <path d="M1190 610c42-145 165-150 162-11-2 102-94 121-162 11Z"/>
      <path d="M1360 610c48-108 147-91 128 22-15 84-91 88-128-22Z"/>
    </g>
    <g fill="url(#leafLight)">
      <path d="M845 730c-112 25-168-62-74-122 72-46 132 6 74 122Z"/>
      <path d="M1160 795c104 26 165-48 90-113-60-51-125-9-90 113Z"/>
      <path d="M760 560c-104-9-126-94-28-116 72-16 107 46 28 116Z"/>
    </g>

    <g transform="translate(1020 370) scale(1.18)" color="#d5a2aa"><use href="#rose"/></g>
    <g transform="translate(1245 285) scale(.96)" color="#f2e8da"><use href="#rose"/></g>
    <g transform="translate(1375 455) scale(.84)" color="#c8919c"><use href="#rose"/></g>
    <g transform="translate(850 400) scale(.82)" color="#efe8dc"><use href="#fullFlower"/></g>
    <g transform="translate(1150 515) scale(.72)" color="#d9bcc8"><use href="#fullFlower"/></g>
    <g transform="translate(760 575) scale(.65)" color="#f5ecdf"><use href="#rose"/></g>

    <g transform="translate(1310 620) scale(.88)"><use href="#daisy"/></g>
    <g transform="translate(1450 650) scale(.62)"><use href="#daisy"/></g>
    <g transform="translate(930 575) scale(.56)"><use href="#daisy"/></g>
    <g transform="translate(705 470) scale(.48)"><use href="#daisy"/></g>

    <g color="#e9d4d0">
      <use href="#tinyFlower" transform="translate(710 670) scale(.9)"/>
      <use href="#tinyFlower" transform="translate(665 620) scale(.7)"/>
      <use href="#tinyFlower" transform="translate(735 720) scale(.65)"/>
      <use href="#tinyFlower" transform="translate(1510 540) scale(.8)"/>
      <use href="#tinyFlower" transform="translate(1475 495) scale(.6)"/>
    </g>
    <g color="#f2e8c9">
      <use href="#tinyFlower" transform="translate(820 650) scale(.55)"/>
      <use href="#tinyFlower" transform="translate(865 690) scale(.48)"/>
      <use href="#tinyFlower" transform="translate(1260 710) scale(.52)"/>
      <use href="#tinyFlower" transform="translate(1515 690) scale(.5)"/>
    </g>

    <path d="M845 1020Q1030 900 1200 1020L1140 1120H910Z" fill="#e8ddce" opacity=".88"/>
    <path d="M915 930Q1045 1000 1165 925" fill="none" stroke="#b69d7c" stroke-width="13" stroke-linecap="round" opacity=".75"/>
  </g>

  <g fill="#fff" opacity=".28">
    <circle cx="900" cy="210" r="7"/><circle cx="1120" cy="140" r="10"/><circle cx="1490" cy="330" r="6"/>
    <circle cx="780" cy="300" r="5"/><circle cx="1340" cy="170" r="8"/><circle cx="1210" cy="650" r="5"/>
  </g>
</svg>
